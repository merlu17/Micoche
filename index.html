<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Gemini</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .boton-gemini { 
            background: #8e75ff; color: white; border: none; padding: 30px; 
            border-radius: 20px; font-size: 2rem; font-weight: bold; width: 100%; margin-top: 20px;
        }
        #status { font-size: 1.5rem; color: #8e75ff; margin: 20px 0; min-height: 1.5em; }
    </style>
</head>
<body>

    <div id="status">Toca el botón lila</div>
    
    <button class="boton-gemini" onclick="comenzar()">✨ HABLAR CON GEMINI</button>

    <script>
        const API_KEY = "AIzaSyDAfXY-wpSJvTuflFIgyYI5eMbMOuaqF5E";
        
        // 1. Configurar reconocimiento de voz
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';

        function comenzar() {
            // TRUCO: Decir una palabra muy corta para abrir el canal de audio del navegador
            const abrirCanal = new SpeechSynthesisUtterance("Dime");
            abrirCanal.volume = 0.1;
            window.speechSynthesis.speak(abrirCanal);

            document.getElementById('status').innerText = "Escuchando...";
            
            try {
                recognition.start();
            } catch (e) {
                console.log("Reconocimiento ya activo");
            }
        }

        recognition.onresult = async (event) => {
            const texto = event.results[0][0].transcript;
            document.getElementById('status').innerText = "Pensando...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: texto }] }] })
                });

                const data = await response.json();
                const respuestaIA = data.candidates[0].content.parts[0].text;
                
                hablar(respuestaIA);
            } catch (error) {
                document.getElementById('status').innerText = "Error de red";
            }
        };

        function hablar(mensaje) {
            document.getElementById('status').innerText = "Respondiendo...";
            const lectura = new SpeechSynthesisUtterance(mensaje);
            lectura.lang = 'es-ES';
            
            // Esto debería sonar solo porque ya "abrimos el canal" al principio
            window.speechSynthesis.speak(lectura);
            
            lectura.onend = () => {
                document.getElementById('status').innerText = "Listo";
            };
        }

        recognition.onerror = () => {
            document.getElementById('status').innerText = "Error: No te oigo";
        };
    </script>
</body>
</html>
