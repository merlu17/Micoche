<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Gemini 3.1</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .boton-principal { 
            background: #8e75ff; color: white; border: none; padding: 30px; 
            border-radius: 25px; font-size: 1.8rem; font-weight: bold; width: 100%;
            box-shadow: 0 4px 15px rgba(142, 117, 255, 0.4);
        }
        #status { font-size: 1.1rem; color: #8e75ff; margin: 20px 0; min-height: 4em; background: #111; padding: 15px; border-radius: 15px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="status">Estado: Listo</div>
    
    <button class="boton-principal" onclick="activarAsistente()">✨ HABLAR CON GEMINI</button>

    <script>
        // Nueva API Key que acabas de generar
        const API_KEY = "AIzaSyAgzM2hFd9prwA1-zNPR4a5GJ4GW0JRycU";
        
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';

        function activarAsistente() {
            window.speechSynthesis.cancel();
            const inicio = new SpeechSynthesisUtterance("Te escucho");
            window.speechSynthesis.speak(inicio);
            
            document.getElementById('status').innerText = "Escuchando...";
            
            inicio.onend = () => {
                try {
                    recognition.start();
                } catch (e) {
                    console.log("Ya iniciado");
                }
            };
        }

        recognition.onresult = async (event) => {
            const prompt = event.results[0][0].transcript;
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Procesando: " + prompt;

            try {
                // He cambiado a v1beta que suele ser más permisiva con llaves nuevas
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    statusDiv.innerHTML = "<span style='color:red'>Error de Google: " + data.error.message + "</span>";
                } else {
                    const textoRespuesta = data.candidates[0].content.parts[0].text;
                    statusDiv.innerText = "Respondiendo...";
                    hablar(textoRespuesta);
                }

            } catch (error) {
                statusDiv.innerHTML = "<span style='color:red'>Error de conexión. Posible bloqueo del navegador al usar archivo local.</span>";
            }
        };

        function hablar(texto) {
            const mensaje = new SpeechSynthesisUtterance(texto);
            mensaje.lang = 'es-ES';
            window.speechSynthesis.speak(mensaje);
            mensaje.onend = () => { document.getElementById('status').innerText = "Listo"; };
        }

        recognition.onerror = (e) => {
            document.getElementById('status').innerText = "Error Micro: " + e.error;
        };
    </script>
</body>
</html>
