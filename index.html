<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Car v11</title><style>
body { 
    background: #000; 
    color: #fff; 
    font-family: sans-serif; 
    text-align: center; 
    padding: 20px; 
}

.btn-lila { 
    background: #8e75ff; 
    color: white; 
    border: none; 
    padding: 35px; 
    border-radius: 30px; 
    font-size: 2rem; 
    font-weight: bold; 
    width: 95%;
}

#info { 
    margin-top: 20px; 
    padding: 15px; 
    background: #111; 
    border-radius: 10px; 
    font-size: 0.9rem; 
    color: #8e75ff; 
    min-height: 100px; 
    border: 1px solid #333; 
    overflow-wrap: break-word; 
}
</style></head><body><button class="btn-lila" onclick="run()">✨ HABLAR AHORA</button>

<div id="info">
Estado: Listo para probar Gemini...
</div><script>

// ⚠️ PON TU NUEVA API KEY AQUÍ
const MI_LLAVE = "PON_AQUI_TU_API_KEY";

// Reconocimiento de voz
const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!Speech) {
    document.getElementById('info').innerText =
    "❌ Este navegador no soporta reconocimiento de voz.";
}

const rec = new Speech();
rec.lang = 'es-ES';
rec.interimResults = false;

// Botón principal
function run() {

    window.speechSynthesis.cancel();

    const saludo = new SpeechSynthesisUtterance("Te escucho");
    saludo.lang = "es-ES";

    document.getElementById('info').innerText =
    "🎤 Preparando micrófono...";

    window.speechSynthesis.speak(saludo);

    saludo.onend = () => {
        rec.start();
        document.getElementById('info').innerText =
        "🎤 Escuchando...";
    };
}

// Cuando reconoce voz
rec.onresult = async (e) => {

    const query = e.results[0][0].transcript;

    const caja = document.getElementById('info');

    caja.innerText =
    "🧠 Pensando: " + query;

    try {

        // ✅ MODELO ACTUAL FUNCIONAL
        const url =
        `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${MI_LLAVE}`;

        const response = await fetch(url, {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify({
                contents: [{
                    parts: [{
                        text: query
                    }]
                }]
            })

        });

        const json = await response.json();

        if (json.error) {

            caja.innerHTML =
            `<b style="color:red">ERROR GOOGLE:</b><br>
            Código: ${json.error.code}<br>
            Mensaje: ${json.error.message}`;

            return;
        }

        const respuesta =
        json.candidates[0].content.parts[0].text;

        caja.innerText =
        "🔊 Respondiendo...";

        decir(respuesta);

    }

    catch (err) {

        caja.innerText =
        "❌ Error conexión: " + err;

    }

};

// Hablar respuesta
function decir(txt) {

    const voz =
    new SpeechSynthesisUtterance(txt);

    voz.lang = 'es-ES';

    window.speechSynthesis.speak(voz);

    voz.onend = () => {

        document.getElementById('info').innerText =
        "✅ Listo.";

    };

}

// Errores de micrófono
rec.onerror = (e) => {

    document.getElementById('info').innerText =
    "❌ Error micrófono: " + e.error;

};

</script></body>
</html>
