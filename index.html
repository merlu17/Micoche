<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Gemini Fix</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .btn { background: #8e75ff; color: white; border: none; padding: 40px; border-radius: 25px; font-size: 2rem; width: 90%; font-weight: bold; }
        #status { font-size: 1.5rem; color: #8e75ff; margin: 30px 0; min-height: 1.5em; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="status">Toca para hablar</div>
    <button class="btn" onclick="iniciar()">✨ GEMINI</button>

    <script>
        const API_KEY = "AIzaSyDAfXY-wpSJvTuflFIgyYI5eMbMOuaqF5E";
        
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';
        recognition.interimResults = false; // Solo queremos el resultado final
        recognition.maxAlternatives = 1;

        function iniciar() {
            // 1. Limpiar cualquier audio previo
            window.speechSynthesis.cancel();
            document.getElementById('status').innerText = "PREPARANDO...";

            // 2. Pequeño sonido de aviso
            const aviso = new SpeechSynthesisUtterance("Te oigo");
            aviso.volume = 0.5;
            window.speechSynthesis.speak(aviso);

            // 3. ESPERAR a que termine de decir "Te oigo" para abrir el micro
            aviso.onend = () => {
                document.getElementById('status').innerText = "🎤 HABLA AHORA...";
                recognition.start();
            };
        }

        recognition.onresult = async (event) => {
            const userText = event.results[0][0].transcript;
            document.getElementById('status').innerText = "PENSANDO...";
            console.log("Has dicho: " + userText);

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: userText }] }] })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                responder(aiText);
            } catch (e) {
                document.getElementById('status').innerText = "ERROR DE CONEXIÓN";
            }
        };

        function responder(texto) {
            document.getElementById('status').innerText = "RESPONDIENDO...";
            const lectura = new SpeechSynthesisUtterance(texto);
            lectura.lang = 'es-ES';
            
            window.speechSynthesis.speak(lectura);
            
            lectura.onend = () => {
                document.getElementById('status').innerText = "LISTO";
            };
        }

        recognition.onerror = (e) => {
            document.getElementById('status').innerText = "ERROR: " + e.error;
            console.error(e);
        };
    </script>
</body>
</html>
