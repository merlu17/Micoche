<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Car v14</title><style>
body {
    background: #000;
    color: #fff;
    font-family: sans-serif;
    text-align: center;
    padding: 20px;
}

.btn-lila {
    background: #8e75ff;
    color: white;
    border: none;
    padding: 35px;
    border-radius: 30px;
    font-size: 2rem;
    font-weight: bold;
    width: 95%;
}

#info {
    margin-top: 20px;
    padding: 15px;
    background: #111;
    border-radius: 10px;
    font-size: 0.9rem;
    color: #8e75ff;
    min-height: 100px;
    border: 1px solid #333;
}
</style></head><body><button class="btn-lila" onclick="run()">✨ HABLAR AHORA</button>

<div id="info">
Estado: Listo
</div><script>
const MI_LLAVE = "AIzaSyBBfJgTfk6vtBUqMZEgROCG4mKBgzZTpZg";

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if (!SpeechRecognition) {
    document.getElementById("info").innerText =
    "❌ Navegador sin soporte de voz";
}

const rec = new SpeechRecognition();

rec.lang = "es-ES";

function run() {

    window.speechSynthesis.cancel();

    const voz =
    new SpeechSynthesisUtterance("Te escucho");

    voz.lang = "es-ES";

    window.speechSynthesis.speak(voz);

    voz.onend = () => {
        rec.start();
        document.getElementById("info").innerText =
        "🎤 Escuchando...";
    };
}

rec.onresult = async function(event) {

    const texto =
    event.results[0][0].transcript;

    const caja =
    document.getElementById("info");

    caja.innerText =
    "🧠 Pensando: " + texto;

    try {

        // MODELO MÁS COMPATIBLE
        const url =
`https://generativelanguage.googleapis.com/v1/models/gemini-2.0-flash:generateContent?key=${MI_LLAVE}`;

        const response =
        await fetch(url, {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                contents: [{
                    parts: [{
                        text: texto
                    }]
                }]
            })

        });

        const data =
        await response.json();

        if (data.error) {

            caja.innerHTML =
            "<b style='color:red'>ERROR GOOGLE:</b><br>" +
            "Código: " + data.error.code +
            "<br>Mensaje: " + data.error.message;

            return;
        }

        const respuesta =
        data.candidates[0]
        .content.parts[0].text;

        hablar(respuesta);

    }

    catch (error) {

        caja.innerText =
        "❌ Error conexión: " + error;

    }

};

function hablar(texto) {

    const voz =
    new SpeechSynthesisUtterance(texto);

    voz.lang = "es-ES";

    window.speechSynthesis.speak(voz);

    voz.onend = () => {

        document.getElementById("info").innerText =
        "✅ Listo";

    };

}

</script></body>
</html>
