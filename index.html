<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Car v16 Fix</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .btn-lila { background: #8e75ff; color: white; border: none; padding: 40px; border-radius: 30px; font-size: 2rem; font-weight: bold; width: 90%; cursor: pointer; }
        .recording { background: #ff4b4b !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 75, 75, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(255, 75, 75, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 75, 75, 0); } }
        #info { margin-top: 20px; padding: 20px; background: #111; border-radius: 15px; width: 80%; min-height: 100px; color: #8e75ff; border: 1px solid #333; }
    </style>
</head>
<body>

<button id="btn" class="btn-lila" onclick="toggleRegistro()">✨ HABLAR</button>
<div id="info">Estado: Listo</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    const btn = document.getElementById("btn");
    const caja = document.getElementById("info");

    async function toggleRegistro() {
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
            btn.classList.remove("recording");
            btn.innerText = "⏳ PROCESANDO...";
            return;
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = (event) => {
                audioChunks.push(event.data);
            };

            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                caja.innerText = "🧠 Enviando audio a Gemini...";
                // Aquí enviarías el audio al Worker
                enviarAudio(audioBlob);
            };

            mediaRecorder.start();
            btn.classList.add("recording");
            btn.innerText = "🛑 DETENER";
            caja.innerText = "Escuchando... pulsa para terminar.";

        } catch (err) {
            caja.innerText = "❌ Error: " + err.message;
        }
    }

    async function enviarAudio(blob) {
        // NOTA: Tu worker actual espera TEXTO. 
        // Si no puedes cambiar el worker a transcripción de audio,
        // intentemos forzar el reconocimiento nativo una última vez con este parche:
        forzarReconocimientoNativo();
    }

    function forzarReconocimientoNativo() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = "es-ES";
        recognition.onstart = () => { console.log("Iniciado"); };
        recognition.onresult = (event) => {
            const texto = event.results[0][0].transcript;
            caja.innerText = "Texto: " + texto;
            // llamar a tu función de fetch aquí
        };
        recognition.start();
    }
</script>
</body>
</html>
