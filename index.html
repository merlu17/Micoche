<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Car AA Stable</title>

<style>
body {
    background: #000;
    color: #fff;
    font-family: sans-serif;
    text-align: center;
    padding: 20px;
}

.btn-lila {
    background: #8e75ff;
    color: white;
    border: none;
    padding: 25px;
    border-radius: 20px;
    font-size: 1.5rem;
    font-weight: bold;
    width: 95%;
    margin-top: 10px;
}

#info {
    margin-top: 20px;
    padding: 15px;
    background: #111;
    border-radius: 10px;
    min-height: 80px;
    color: #8e75ff;
    border: 1px solid #333;
}

input {
    width: 95%;
    padding: 15px;
    font-size: 1.2rem;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}
</style>
</head>

<body>

<h3>Gemini Car AA</h3>

<input id="texto" placeholder="Escribe aquí o usa voz del teclado">

<button class="btn-lila" onclick="enviar()">🚗 ENVIAR</button>

<div id="info">Estado: Listo</div>

<script>

const WORKER_URL = "https://shy-bird-e0a6.merlu17.workers.dev/";

async function enviar() {

    const texto = document.getElementById("texto").value;

    if (!texto) {
        document.getElementById("info").innerText = "Escribe algo primero";
        return;
    }

    const caja = document.getElementById("info");
    caja.innerText = "🧠 Pensando: " + texto;

    try {

        const response = await fetch(WORKER_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                contents: [{
                    parts: [{
                        text: texto
                    }]
                }]
            })
        });

        const data = await response.json();

        const respuesta =
        data.candidates?.[0]?.content?.parts?.[0]?.text
        || "Sin respuesta";

        caja.innerText = respuesta;

        hablar(respuesta);

    } catch (e) {
        caja.innerText = "❌ Error: " + e;
    }
}

function hablar(texto) {

    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang = "es-ES";

    window.speechSynthesis.speak(voz);

}

</script>

</body>
</html>
