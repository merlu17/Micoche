<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel AA Gemini 3.1</title>
    <style>
        :root { --bg: #000; --blue: #1a73e8; --purple: #8e75ff; --text: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; text-align: center; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; }
        
        #status { font-size: 1.4rem; font-weight: bold; margin-bottom: 15px; color: var(--purple); height: 1.6em; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; flex-grow: 1; }
        .boton { 
            display: flex; align-items: center; justify-content: center; 
            background: var(--blue); color: white; text-decoration: none; 
            border-radius: 25px; font-size: 1.6rem; font-weight: bold; border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .boton:active { transform: scale(0.92); background: #1557b0; }
        .gemini { background: var(--purple); grid-column: span 2; font-size: 2rem; }
        
        /* Indicador visual de que está escuchando */
        .pulsar { animation: latido 1.5s infinite; }
        @keyframes latido { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="status">Listo para ayudarte</div>

    <div class="grid">
        <a href="https://www.youtube.com" class="boton">YouTube</a>
        <a href="https://www.google.es" class="boton">Google</a>
        <a href="https://www.reddit.com" class="boton">Reddit</a>
        <a href="https://www.eltiempo.es" class="boton">El Tiempo</a>
        
        <button id="btnGemini" onclick="iniciarAsistente()" class="boton gemini">✨ Hablar con Gemini 3.1</button>
    </div>

    <script>
        const API_KEY = "AIzaSyDAfXY-wpSJvTuflFIgyYI5eMbMOuaqF5E";
        const statusDiv = document.getElementById('status');
        const btnGemini = document.getElementById('btnGemini');

        // Configuración de Voz
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';
        recognition.interimResults = false;

        function iniciarAsistente() {
            statusDiv.innerText = "🎤 Escuchando...";
            btnGemini.classList.add('pulsar');
            recognition.start();
        }

        recognition.onresult = async (event) => {
            btnGemini.classList.remove('pulsar');
            const mensajeUsuario = event.results[0][0].transcript;
            statusDiv.innerText = "🧠 Pensando...";
            
            try {
                // LLAMADA A GEMINI 3 FLASH
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: mensajeUsuario }] }]
                    })
                });

                const data = await response.json();
                const respuestaIA = data.candidates[0].content.parts[0].text;
                
                responderVoz(respuestaIA);
            } catch (e) {
                statusDiv.innerText = "❌ Error de conexión";
                btnGemini.classList.remove('pulsar');
            }
        };

        function responderVoz(texto) {
            statusDiv.innerText = "🔊 Respondiendo...";
            const lectura = new SpeechSynthesisUtterance(texto);
            lectura.lang = 'es-ES';
            lectura.rate = 1.1; // Un pelín más rápido para que no aburra en el coche
            
            lectura.onend = () => {
                statusDiv.innerText = "Listo";
            };
            
            window.speechSynthesis.speak(lectura);
        }

        recognition.onerror = () => {
            btnGemini.classList.remove('pulsar');
            statusDiv.innerText = "No te he oído bien";
        };
    </script>
</body>
</html>
