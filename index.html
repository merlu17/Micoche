<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini AA Fix</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .btn { background: #8e75ff; color: white; border: none; padding: 30px; border-radius: 20px; font-size: 1.8rem; width: 100%; font-weight: bold; }
        #status { font-size: 1.2rem; color: #8e75ff; margin: 20px 0; min-height: 3em; word-wrap: break-word; }
    </style>
</head>
<body>

    <div id="status">Toca para hablar</div>
    <button class="btn" onclick="iniciar()">✨ HABLAR AHORA</button>

    <script>
        const API_KEY = "AIzaSyDAfXY-wpSJvTuflFIgyYI5eMbMOuaqF5E";
        
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';

        function iniciar() {
            window.speechSynthesis.cancel();
            document.getElementById('status').innerText = "PREPARANDO...";
            const aviso = new SpeechSynthesisUtterance("Te oigo");
            window.speechSynthesis.speak(aviso);

            aviso.onend = () => {
                document.getElementById('status').innerText = "🎤 HABLA...";
                recognition.start();
            };
        }

        recognition.onresult = async (event) => {
            const userText = event.results[0][0].transcript;
            document.getElementById('status').innerText = "ENVIANDO: " + userText;

            try {
                // He cambiado v1beta por v1 para mayor estabilidad
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userText }] }]
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(JSON.stringify(errorData));
                }

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                responder(aiText);

            } catch (e) {
                document.getElementById('status').innerText = "ERROR DETALLADO: " + e.message;
                console.error(e);
            }
        };

        function responder(texto) {
            document.getElementById('status').innerText = "RESPONDIDENDO...";
            const lectura = new SpeechSynthesisUtterance(texto);
            lectura.lang = 'es-ES';
            window.speechSynthesis.speak(lectura);
            lectura.onend = () => { document.getElementById('status').innerText = "LISTO"; };
        }

        recognition.onerror = (e) => { document.getElementById('status').innerText = "ERROR MICRO: " + e.error; };
    </script>
</body>
</html>
