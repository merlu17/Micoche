<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Gemini</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding-top: 50px; }
        #btn { background: #8e75ff; color: #fff; border: none; padding: 40px; border-radius: 20px; font-size: 1.5rem; width: 80%; }
        #status { margin: 20px; font-size: 1.2rem; color: #aaa; }
    </style>
</head>
<body>

    <div id="status">Paso 1: Pulsa el botón</div>
    <button id="btn" onclick="ejecutar()">✨ INICIAR ASISTENTE</button>

    <script>
        const API_KEY = "AIzaSyDAfXY-wpSJvTuflFIgyYI5eMbMOuaqF5E";
        
        // Configuramos la voz fuera para que esté lista
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';

        async function ejecutar() {
            document.getElementById('status').innerText = "Escuchando...";
            try {
                recognition.start();
            } catch (e) {
                alert("Error al abrir micro: " + e.message);
            }
        }

        recognition.onresult = async (event) => {
            const texto = event.results[0][0].transcript;
            document.getElementById('status').innerText = "Gemini pensando...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: texto }] }] })
                });

                const data = await response.json();
                const respuestaIA = data.candidates[0].content.parts[0].text;
                
                hablar(respuestaIA);
            } catch (error) {
                document.getElementById('status').innerText = "Error API: " + error;
            }
        };

        function hablar(mensaje) {
            document.getElementById('status').innerText = "Respondiendo...";
            const lectura = new SpeechSynthesisUtterance(mensaje);
            lectura.lang = 'es-ES';
            
            // Forzamos la voz
            window.speechSynthesis.speak(lectura);
            
            lectura.onend = () => {
                document.getElementById('status').innerText = "Terminado. Pulsa para repetir.";
            };
        }

        recognition.onerror = (e) => {
            document.getElementById('status').innerText = "Error: " + e.error;
            if(e.error === 'not-allowed') alert("Debes dar permiso al micrófono en la barra de arriba del navegador");
        };
    </script>
</body>
</html>
