<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Car PRO</title>

<style>
body {
    background: #000;
    color: #fff;
    font-family: sans-serif;
    text-align: center;
    padding: 20px;
}

input {
    width: 95%;
    padding: 20px;
    font-size: 1.3rem;
    border-radius: 15px;
    border: none;
    margin-top: 20px;
}

button {
    background: #8e75ff;
    color: white;
    border: none;
    padding: 30px;
    border-radius: 25px;
    font-size: 2rem;
    font-weight: bold;
    width: 95%;
    margin-top: 20px;
}

#info {
    margin-top: 20px;
    padding: 15px;
    background: #111;
    border-radius: 10px;
    min-height: 120px;
    color: #8e75ff;
    border: 1px solid #333;
}
</style>
</head>

<body>

<h2>🚗 Gemini Car PRO</h2>

<!-- 🎤 AQUÍ VA EL DICTADO DEL SISTEMA -->
<input id="texto" placeholder="Pulsa 🎤 del teclado y habla">

<button onclick="enviar()">ENVIAR 🚀</button>

<div id="info">Estado: listo</div>

<script>

const WORKER_URL = "https://shy-bird-e0a6.merlu17.workers.dev/";

async function enviar() {

    const texto = document.getElementById("texto").value;

    if (!texto) {
        document.getElementById("info").innerText =
        "❌ Usa el micrófono del teclado 🎤";
        return;
    }

    const caja = document.getElementById("info");
    caja.innerText = "🧠 Pensando...";

    try {

        const response = await fetch(WORKER_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                contents: [{
                    parts: [{
                        text: texto
                    }]
                }]
            })
        });

        const data = await response.json();

        const respuesta =
        data.candidates?.[0]?.content?.parts?.[0]?.text
        || "Sin respuesta";

        caja.innerText = respuesta;

        hablar(respuesta);

    } catch (e) {
        caja.innerText = "❌ Error: " + e;
    }
}

function hablar(texto) {

    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang = "es-ES";

    window.speechSynthesis.speak(voz);

}

</script>

</body>
</html>
