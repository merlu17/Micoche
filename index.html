<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Auto</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .boton { 
            background: #8e75ff; color: white; border: none; padding: 35px; 
            border-radius: 25px; font-size: 2rem; font-weight: bold; width: 100%;
            margin-top: 20px;
        }
        #status { font-size: 1rem; color: #8e75ff; margin-top: 20px; background: #111; padding: 15px; border-radius: 10px; min-height: 50px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="status">Listo para el coche</div>
    <button class="boton" onclick="iniciar()">✨ HABLAR AHORA</button>

    <script>
        // ESTA ES TU NUEVA CLAVE SIN ESPACIOS
        const KEY = "AIzaSyAgzM2hFd9prwA1-zNPR4a5GJ4GW0JRycU";
        
        const speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new speech();
        recognition.lang = 'es-ES';

        function iniciar() {
            window.speechSynthesis.cancel();
            const t = new SpeechSynthesisUtterance("Te oigo");
            window.speechSynthesis.speak(t);
            document.getElementById('status').innerText = "Escuchando...";
            t.onend = () => { recognition.start(); };
        }

        recognition.onresult = async (e) => {
            const txt = e.results[0][0].transcript;
            document.getElementById('status').innerText = "Enviando: " + txt;

            try {
                // URL corregida a v1beta
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: txt }] }] })
                });

                const res = await r.json();

                if (res.error) {
                    document.getElementById('status').innerHTML = "<span style='color:red'>Error: " + res.error.message + "</span>";
                } else {
                    const final = res.candidates[0].content.parts[0].text;
                    hablar(final);
                }
            } catch (err) {
                document.getElementById('status').innerText = "Error de red: " + err;
            }
        };

        function hablar(msg) {
            document.getElementById('status').innerText = "Respondiendo...";
            const v = new SpeechSynthesisUtterance(msg);
            v.lang = 'es-ES';
            window.speechSynthesis.speak(v);
            v.onend = () => { document.getElementById('status').innerText = "Listo"; };
        }
    </script>
</body>
</html>
