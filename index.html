<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Panel de Coche</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        .boton { 
            background: #1a73e8; color: white; padding: 40px 20px; 
            text-decoration: none; border-radius: 15px; font-size: 24px; font-weight: bold;
        }
        .boton:active { background: #1557b0; }
    </style>
</head>
<body>
    <h1>Mis Accesos Rápidos</h1>
    <div class="grid">
        <a href="https://www.youtube.com" class="boton">YouTube</a>
        <a href="https://www.google.es" class="boton">Google</a>
        <a href="https://www.reddit.com" class="boton">Reddit</a>
        <a href="https://www.eltiempo.es" class="boton">El Tiempo</a>
        <a href="https://gemini.google.com/app?hl=es-ES" class="boton" style="background: #8e75ff;">Gemini</a>
    </div>
</body>
</html>
