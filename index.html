<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Car v16</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .btn-lila { background: #8e75ff; color: white; border: none; padding: 40px; border-radius: 30px; font-size: 2rem; font-weight: bold; width: 90%; cursor: pointer; }
        .listening { background: #ff4b4b !important; }
        #info { margin-top: 20px; padding: 20px; background: #111; border-radius: 15px; width: 80%; min-height: 100px; color: #8e75ff; border: 1px solid #333; font-size: 1.1rem; }
    </style>
</head>
<body>

    <button id="btn" class="btn-lila" onclick="run()">✨ HABLAR AHORA</button>
    <div id="info">Estado: Listo</div>

    <script>
        const WORKER_URL = "https://shy-bird-e0a6.merlu17.workers.dev/";
        const btn = document.getElementById("btn");
        const caja = document.getElementById("info");

        // Intentar todas las variantes de Speech API
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition || window.mozSpeechRecognition || window.msSpeechRecognition;
        let rec = null;

        if (SpeechRecognition) {
            rec = new SpeechRecognition();
            rec.lang = "es-ES";
            rec.onstart = () => { btn.classList.add("listening"); btn.innerText = "🎤 ESCUCHANDO..."; };
            rec.onresult = (e) => procesar(e.results[0][0].transcript);
            rec.onerror = (e) => { caja.innerText = "❌ Error Micro: " + e.error; resetBtn(); };
            rec.onend = () => resetBtn();
        }

        function resetBtn() {
            btn.classList.remove("listening");
            btn.innerText = "✨ HABLAR AHORA";
        }

        async function run() {
            window.speechSynthesis.cancel();
            if (!rec) { caja.innerText = "❌ Navegador no compatible"; return; }
            try { rec.start(); } catch(e) { console.log(e); }
        }

        async function procesar(texto) {
            caja.innerText = "🧠 Pensando: " + texto;
            btn.innerText = "⏳ PROCESANDO...";

            try {
                const res = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: texto }] }] })
                });

                if (!res.ok) {
                    const errorText = await res.text();
                    throw new Error("Worker falló: " + errorText);
                }

                const data = await res.json();
                const respuestaIA = data.candidates[0].content.parts[0].text;
                
                caja.innerText = respuestaIA;
                hablar(respuestaIA);
            } catch (err) {
                caja.innerText = "❌ Error al procesar: " + err.message;
            } finally {
                resetBtn();
            }
        }

        function hablar(t) {
            const msg = new SpeechSynthesisUtterance(t.replace(/[*#_~-]/g, ''));
            msg.lang = "es-ES";
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
