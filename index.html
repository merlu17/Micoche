<script>
    const WORKER_URL = "https://shy-bird-e0a6.merlu17.workers.dev/";
    const caja = document.getElementById("info");
    const btn = document.getElementById("mainBtn");

    async function run() {
        // Detener cualquier voz previa
        window.speechSynthesis.cancel();

        try {
            // FORZAR SOLICITUD DE MICRO (Esto despierta al navegador)
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            caja.innerHTML = "🎤 Micro detectado. Intentando reconocer...";
            
            // Si el stream funciona, intentamos el reconocimiento
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                throw new Error("API SpeechRecognition no soportada en este navegador de AA.");
            }

            const rec = new SpeechRecognition();
            rec.lang = "es-ES";

            rec.onstart = () => {
                btn.classList.add("escuchando");
                btn.innerText = "🎤 ESCUCHANDO...";
            };

            rec.onresult = async (event) => {
                const texto = event.results[0][0].transcript;
                enviarAGemini(texto);
            };

            rec.onerror = (e) => {
                caja.innerHTML = "❌ Error: " + e.error + ". Puede que AA bloquee el micro.";
                stopStream(stream);
            };

            rec.onend = () => {
                btn.classList.remove("escuchando");
                btn.innerText = "✨ HABLAR";
                stopStream(stream);
            };

            rec.start();

        } catch (err) {
            caja.innerHTML = "❌ Bloqueo total: " + err.message;
            console.error(err);
        }
    }

    function stopStream(stream) {
        stream.getTracks().forEach(track => track.stop());
    }

    async function enviarAGemini(texto) {
        caja.innerHTML = "🧠 Pensando...";
        try {
            const response = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: texto }] }] })
            });
            const data = await response.json();
            const respuesta = data.candidates?.[0]?.content?.parts?.[0]?.text || "Sin respuesta";
            caja.innerHTML = respuesta;
            hablar(respuesta);
        } catch (e) {
            caja.innerHTML = "❌ Error Worker";
        }
    }

    function hablar(texto) {
        const mensaje = new SpeechSynthesisUtterance(texto.replace(/[*#_~-]/g, ''));
        mensaje.lang = "es-ES";
        window.speechSynthesis.speak(mensaje);
    }
</script>
